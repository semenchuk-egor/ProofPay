[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc-version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
ffi = false

[rpc_endpoints]
base = "${BASE_MAINNET_RPC_URL}"
basesepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }
basesepolia = { key = "${BASESCAN_API_KEY}" }
