name: deploy-basemainnet
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (e.g. v0.1.0)
        required: true
      FORCE_DEPLOY:
        description: true to deploy a new proxy even if one exists
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      OWNER_ADDRESS: ${{ secrets.OWNER_ADDRESS }}
      VERIFIER_ADDRESS: ${{ secrets.VERIFIER_ADDRESS }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      FORCE_DEPLOY: ${{ inputs.FORCE_DEPLOY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Ensure deployments file
        run: mkdir -p deployments && [ -f deployments/8453.json ] || echo "[]" > deployments/8453.json
      - name: Build
        run: npm run build
      - name: Deploy
        run: npm run deploy:mainnet
      - name: Verify implementation on Basescan
        run: |
          IMPL=$(jq -r 'last(.[]).implementation' deployments/8453.json)
          if [ "$IMPL" != "null" ] && [ -n "$IMPL" ]; then
            npx hardhat verify --network base_mainnet "$IMPL"
          fi
      - name: Tag pre-release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
