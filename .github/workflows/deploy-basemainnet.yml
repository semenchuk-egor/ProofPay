name: deploy-basemainnet
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (v0.1.0)
        required: true
      FORCE_DEPLOY:
        description: set true only if you want a new proxy
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      OWNER_ADDRESS: ${{ secrets.OWNER_ADDRESS }}
      VERIFIER_ADDRESS: ${{ secrets.VERIFIER_ADDRESS }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      FORCE_DEPLOY: ${{ inputs.FORCE_DEPLOY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Ensure deployments file
        run: mkdir -p deployments && [ -f deployments/8453.json ] || echo "[]" > deployments/8453.json

      - name: Build (Hardhat)
        run: npm run build

      - name: Deploy proxy (Hardhat)
        run: npm run deploy:mainnet

      - name: Backfill implementation if missing
        run: npm run backfill:mainnet

      - name: Extract and sanitize implementation
        id: impl
        run: |
          node -e "
            const fs=require('fs');
            const p='deployments/8453.json';
            if(!fs.existsSync(p)){console.log('');process.exit(0)}
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            const last=(Array.isArray(j)?j:[j]).slice(-1)[0]||{};
            const a=String(last.implementation||'').trim().replace(/\s+/g,'');
            const ok=/^0x[0-9a-fA-F]{40}$/.test(a);
