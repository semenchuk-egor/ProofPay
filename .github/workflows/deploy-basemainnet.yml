name: deploy-basemainnet
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (v0.1.0)
        required: true
      FORCE_DEPLOY:
        description: set true only if you want a new proxy
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      OWNER_ADDRESS: ${{ secrets.OWNER_ADDRESS }}
      VERIFIER_ADDRESS: ${{ secrets.VERIFIER_ADDRESS }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      FORCE_DEPLOY: ${{ inputs.FORCE_DEPLOY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Ensure deployments file
        run: mkdir -p deployments && [ -f deployments/8453.json ] || echo "[]" > deployments/8453.json

      - name: Build (Hardhat)
        run: npm run build

      - name: Deploy proxy (Hardhat)
        run: npm run deploy:mainnet

      - name: Backfill implementation if missing
        run: npm run backfill:mainnet

      - name: Extract and sanitize implementation
        id: impl
        run: |
          node scripts/ci-read-impl.js deployments/8453.json > .impl || true
          echo "value=$(tr -d '\r\n' < .impl)" >> $GITHUB_OUTPUT

      - name: Ensure code exists at implementation
        id: hascode
        if: steps.impl.outputs.value != ''
        run: |
          node -e "const {ethers}=require('ethers');const prov=new ethers.JsonRpcProvider(process.env.BASE_MAINNET_RPC_URL);prov.getCode('${{ steps.impl.outputs.value }}').then(c=>process.stdout.write(c&&c.length>2?'yes':''));" > .hascode
          echo "value=$(tr -d '\r\n' < .hascode)" >> $GITHUB_OUTPUT

      - name: Wait index
        if: steps.hascode.outputs.value != ''
        run: sleep 20

      - name: Verify implementation on Basescan
        if: steps.hascode.outputs.value != ''
        continue-on-error: true
        run: |
          echo "Verifying: ${{ steps.impl.outputs.value }}"
          npx hardhat compile --force
          npx hardhat verify --network base_mainnet "${{ steps.impl.outputs.value }}" || \
          npx hardhat verify --network base_mainnet --contract contracts/ProofPay.sol:ProofPay "${{ steps.impl.outputs.value }}"

      - name: Tag pre-release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
