name: deploy-basesepolia
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (v0.1.0)
        required: true
      FORCE_DEPLOY:
        description: set true only if you want a new proxy
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      OWNER_ADDRESS: ${{ secrets.OWNER_ADDRESS }}
      VERIFIER_ADDRESS: ${{ secrets.VERIFIER_ADDRESS }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      FORCE_DEPLOY: ${{ inputs.FORCE_DEPLOY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Ensure deployments file
        run: mkdir -p deployments && [ -f deployments/84532.json ] || echo "[]" > deployments/84532.json
      - name: Build (Hardhat)
        run: npm run build
      - name: Deploy proxy (Hardhat)
        run: npm run deploy:sepolia
      - name: Verify implementation on Basescan
        run: |
          IMPL=$(jq -r 'last(.[]).implementation' deployments/84532.json)
          if [ "$IMPL" != "null" ] && [ -n "$IMPL" ]; then
            npx hardhat verify --network base_sepolia "$IMPL"
          fi
      - name: Tag pre-release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
