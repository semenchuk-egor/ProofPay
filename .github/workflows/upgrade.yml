name: upgrade
on:
  workflow_dispatch:
    inputs:
      network:
        description: base_sepolia or base_mainnet
        required: true
        default: base_sepolia
      tag:
        description: release tag (e.g. v0.1.1)
        required: true

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Run upgrade
        run: |
          if [ "${{ inputs.network }}" = "base_mainnet" ]; then
            npm run upgrade:mainnet
          else
            npm run upgrade:sepolia
          fi
      - name: Verify implementation
        run: |
          if [ "${{ inputs.network }}" = "base_mainnet" ]; then
            IMPL=$(jq -r 'last(.[]).implementation' deployments/8453.json)
            npx hardhat verify --network base_mainnet "$IMPL"
          else
            IMPL=$(jq -r 'last(.[]).implementation' deployments/84532.json)
            npx hardhat verify --network base_sepolia "$IMPL"
          fi
      - name: Tag release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
