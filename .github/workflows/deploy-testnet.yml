name: Deploy to Base Sepolia
on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Set to 1 to force new proxy deployment"
        required: false
        default: "0"

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure deployments dir exists
        run: mkdir -p deployments

      - name: Setup Node (cached)
        if: ${{ hashFiles('package-lock.json','npm-shrinkwrap.json','yarn.lock') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Node (no cache)
        if: ${{ hashFiles('package-lock.json','npm-shrinkwrap.json','yarn.lock') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            npm install --no-fund --no-audit
          fi

      - name: Build
        run: npm run build

      - name: Deploy (Base Sepolia)
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          GITHUB_SHA: ${{ github.sha }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy }}
        run: |
          npx hardhat run scripts/deploy.ts --network base_sepolia | tee deploy.log
          echo '### Deploy Output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat deploy.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload deployments artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployments-${{ github.run_id }}
          path: deployments/

      - name: Commit deployments folder
        run: |
          if [ -d deployments ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deployments
            git commit -m "chore(deployments): update for run $GITHUB_RUN_ID" || exit 0
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
