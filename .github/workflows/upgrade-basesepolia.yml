name: upgrade-basesepolia
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (e.g. v0.1.1)
        required: true

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (Hardhat)
        run: npm run build

      - name: Upgrade (Hardhat)
        run: npm run upgrade:sepolia

      - name: Backfill implementation
        run: npm run backfill:sepolia

      - name: Extract and sanitize implementation
        id: impl
        run: |
          node scripts/ci-read-impl.js deployments/84532.json > .impl || true
          echo "value=$(tr -d '\r\n' < .impl)" >> $GITHUB_OUTPUT

      - name: Ensure code exists at implementation
        id: hascode
        if: steps.impl.outputs.value != ''
        run: |
          node -e "const {ethers}=require('ethers');const prov=new ethers.JsonRpcProvider(process.env.BASE_SEPOLIA_RPC_URL);prov.getCode('${{ steps.impl.outputs.value }}').then(c=>process.stdout.write(c&&c.length>2?'yes':''));" > .hascode
          echo "value=$(tr -d '\r\n' < .hascode)" >> $GITHUB_OUTPUT

      - name: Wait index
        if: steps.hascode.outputs.value != ''
        run: sleep 20

      - name: Verify implementation on Basescan
        if: steps.hascode.outputs.value != ''
        continue-on-error: true
        run: |
          echo "Verifying: ${{ steps.impl.outputs.value }}"
          npx hardhat compile --force
          npx hardhat verify --network base_sepolia "${{ steps.impl.outputs.value }}" || \
          npx hardhat verify --network base_sepolia --contract contracts/ProofPay.sol:ProofPay "${{ steps.impl.outputs.value }}"

      - name: Tag release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
