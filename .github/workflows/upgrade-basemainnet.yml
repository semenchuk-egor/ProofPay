name: upgrade-basemainnet
on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag (e.g. v0.1.1)
        required: true

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build (Hardhat)
        run: npm run build
      - name: Upgrade (Hardhat)
        run: npm run upgrade:mainnet
      - name: Verify implementation on Basescan
        run: |
          node -e "const fs=require('fs');const p='deployments/8453.json';if(!fs.existsSync(p)){process.exit(0)}const j=JSON.parse(fs.readFileSync(p,'utf8'));const a=(Array.isArray(j)?j:[j]).slice(-1)[0]?.implementation||'';const x=a.trim();const ok=/^0x[0-9a-fA-F]{40}$/.test(x);if(!ok){console.log('skip verify: invalid implementation:', JSON.stringify(x));process.exit(0)}console.log(x)" > .impl
          IMPL=$(cat .impl)
          if [ -n "$IMPL" ]; then
            npx hardhat verify --network base_mainnet "$IMPL"
          fi
      - name: Tag release
        run: |
          git tag -f ${{ inputs.tag }}
          git push -f origin ${{ inputs.tag }}
